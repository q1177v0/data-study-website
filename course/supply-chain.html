<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>供应链数据分析 | 课程学习</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .back-btn {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            background: #2980b9;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
        }
        .exercise {
            background: #fff;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 180px;
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
        }
        button {
            padding: 10px 20px;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #output {
            background: #222;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            min-height: 120px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href=" " class="back-btn">← 返回首页</a >

        <h1>供应链数据分析（10个实操练习）</h1>

        <div class="exercise">
            <h3>练习1：库存基础数据</h3>
            <textarea id="code1">import pandas as pd
data = {"商品":["A","B","C"],"库存":[150,230,90]}
df = pd.DataFrame(data)
print("库存数据表：")
print(df)</textarea>
            <button onclick="runCode('code1','out1')">运行</button>
            <div id="out1"></div>
        </div>

        <div class="exercise">
            <h3>练习2：库存总量统计</h3>
            <textarea id="code2">import pandas as pd
df = pd.DataFrame({"商品":["A","B"],"库存":[120,180]})
print("总库存数量：",df["库存"].sum())</textarea>
            <button onclick="runCode('code2','out2')">运行</button>
            <div id="out2"></div>
        </div>

        <div class="exercise">
            <h3>练习3：低库存商品筛选</h3>
            <textarea id="code3">import pandas as pd
df = pd.DataFrame({"商品":["A","B","C"],"库存":[40,160,55]})
low = df[df["库存"] < 60]
print("库存不足商品：")
print(low)</textarea>
            <button onclick="runCode('code3','out3')">运行</button>
            <div id="out3"></div>
        </div>

        <div class="exercise">
            <h3>练习4：出入库数据合并</h3>
            <textarea id="code4">import pandas as pd
in_df = pd.DataFrame({"商品":["A"],"入库":[100]})
out_df = pd.DataFrame({"商品":["A"],"出库":[30]})
df = pd.merge(in_df,out_df,on="商品")
print(df)</textarea>
            <button onclick="runCode('code4','out4')">运行</button>
            <div id="out4"></div>
        </div>

        <div class="exercise">
            <h3>练习5：计算实时库存</h3>
            <textarea id="code5">import pandas as pd
df = pd.DataFrame({"商品":["A"],"入库":[200],"出库":[80]})
df["实时库存"] = df["入库"] - df["出库"]
print(df)</textarea>
            <button onclick="runCode('code5','out5')">运行</button>
            <div id="out5"></div>
        </div>

        <div class="exercise">
            <h3>练习6：按供应商分组统计</h3>
            <textarea id="code6">import pandas as pd
df = pd.DataFrame({"供应商":["甲","甲","乙"],"数量":[50,70,90]})
print(df.groupby("供应商")["数量"].sum())</textarea>
            <button onclick="runCode('code6','out6')">运行</button>
            <div id="out6"></div>
        </div>

        <div class="exercise">
            <h3>练习7：订单数据排序</h3>
            <textarea id="code7">import pandas as pd
df = pd.DataFrame({"订单号":[1,2,3],"金额":[200,80,150]})
df_sort = df.sort_values("金额",ascending=False)
print("订单金额降序：")
print(df_sort)</textarea>
            <button onclick="runCode('code7','out7')">运行</button>
            <div id="out7"></div>
        </div>

        <div class="exercise">
            <h3>练习8：物流时效统计</h3>
            <textarea id="code8">import pandas as pd
df = pd.DataFrame({"线路":["1号线","1号线","2号线"],"时效":[24,22,30]})
print("各线路平均时效：")
print(df.groupby("线路")["时效"].mean())</textarea>
            <button onclick="runCode('code8','out8')">运行</button>
            <div id="out8"></div>
        </div>

        <div class="exercise">
            <h3>练习9：滞销商品判断</h3>
            <textarea id="code9">import pandas as pd
df = pd.DataFrame({"商品":["A","B"],"销量":[15,80]})
bad = df[df["销量"] < 30]
print("滞销商品：")
print(bad)</textarea>
            <button onclick="runCode('code9','out9')">运行</button>
            <div id="out9"></div>
        </div>

        <div class="exercise">
            <h3>练习10：供应链综合分析</h3>
            <textarea id="code10">import pandas as pd
df = pd.DataFrame({
    "商品":["A","B","A","B"],
    "库存":[200,150,180,140],
    "销量":[30,20,25,18]
})
print("商品总销量：")
print(df.groupby("商品")["销量"].sum())
</textarea>
            <button onclick="runCode('code10','out10')">运行</button>
            <div id="out10"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="../js/code-runner.js"></script>
</body>
</html>
