<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场数据调查 | 课程学习</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .back-btn {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            background: #2980b9;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
        }
        .exercise {
            background: #fff;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 180px;
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
        }
        button {
            padding: 10px 20px;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #output {
            background: #222;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            min-height: 120px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href=" " class="back-btn">← 返回首页</a >

        <h1>市场数据调查（10个实操练习）</h1>

        <div class="exercise">
            <h3>练习1：问卷样本数据</h3>
            <textarea id="code1">import pandas as pd
df = pd.DataFrame({
    "年龄段":["青年","中年","青年"],
    "偏好":["产品A","产品B","产品A"],
    "评分":[8,7,9]
})
print(df)</textarea>
            <button onclick="runCode('code1','out1')">运行</button>
            <div id="out1"></div>
        </div>

        <div class="exercise">
            <h3>练习2：样本数量统计</h3>
            <textarea id="code2">import pandas as pd
df = pd.DataFrame({"样本":[1,2,3,4,5]})
print("有效问卷总数：",len(df))</textarea>
            <button onclick="runCode('code2','out2')">运行</button>
            <div id="out2"></div>
        </div>

        <div class="exercise">
            <h3>练习3：不同人群偏好统计</h3>
            <textarea id="code3">import pandas as pd
df = pd.DataFrame({"人群":["学生","职场","学生"],"选择":["品牌1","品牌2","品牌1"]})
print(df.groupby("人群")["选择"].value_counts())</textarea>
            <button onclick="runCode('code3','out3')">运行</button>
            <div id="out3"></div>
        </div>

        <div class="exercise">
            <h3>练习4：平均满意度评分</h3>
            <textarea id="code4">import pandas as pd
df = pd.DataFrame({"评分":[6,7,8,9,7]})
print("平均满意度：",round(df["评分"].mean(),2))</textarea>
            <button onclick="runCode('code4','out4')">运行</button>
            <div id="out4"></div>
        </div>

        <div class="exercise">
            <h3>练习5：高分评价筛选</h3>
            <textarea id="code5">import pandas as pd
df = pd.DataFrame({"用户":["U1","U2","U3"],"评分":[9,6,8]})
good = df[df["评分"] >= 8]
print("高分评价用户：")
print(good)</textarea>
            <button onclick="runCode('code5','out5')">运行</button>
            <div id="out5"></div>
        </div>

        <div class="exercise">
            <h3>练习6：区域市场数据分组</h3>
            <textarea id="code6">import pandas as pd
df = pd.DataFrame({"区域":["东区","西区","东区"],"销量":[120,90,110]})
print(df.groupby("区域")["销量"].sum())</textarea>
            <button onclick="runCode('code6','out6')">运行</button>
            <div id="out6"></div>
        </div>

        <div class="exercise">
            <h3>练习7：竞品数据对比排序</h3>
            <textarea id="code7">import pandas as pd
df = pd.DataFrame({"品牌":["X","Y","Z"],"市场份额":[35,28,22]})
print(df.sort_values("市场份额",ascending=False))</textarea>
            <button onclick="runCode('code7','out7')">运行</button>
            <div id="out7"></div>
        </div>

        <div class="exercise">
            <h3>练习8：数据去重（重复问卷清理）</h3>
            <textarea id="code8">import pandas as pd
df = pd.DataFrame({"id":[1,2,2,3]})
new_df = df.drop_duplicates()
print("去重后有效样本：")
print(new_df)</textarea>
            <button onclick="runCode('code8','out8')">运行</button>
            <div id="out8"></div>
        </div>

        <div class="exercise">
            <h3>练习9：价格接受度分析</h3>
            <textarea id="code9">import pandas as pd
df = pd.DataFrame({"价位":["低","中","高"],"人数":[45,62,23]})
print("各价位接受人数：")
print(df)</textarea>
            <button onclick="runCode('code9','out9')">运行</button>
            <div id="out9"></div>
        </div>

        <div class="exercise">
            <h3>练习10：市场调研综合分析</h3>
            <textarea id="code10">import pandas as pd
data = {
    "性别":["男","女","男","女"],
    "意向产品":["A","B","B","A"],
    "意向度":[7,8,6,9]
}
df = pd.DataFrame(data)
print("不同性别平均意向度：")
print(df.groupby("性别")["意向度"].mean())
</textarea>
            <button onclick="runCode('code10','out10')">运行</button>
            <div id="out10"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="../js/code-runner.js"></script>
</body>
</html>
