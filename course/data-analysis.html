<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据分析技术 | 课程学习</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .back-btn {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            background: #2980b9;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
        }
        .exercise {
            background: #fff;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 180px;
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
        }
        button {
            padding: 10px 20px;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #output {
            background: #222;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            min-height: 120px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href=" " class="back-btn">← 返回首页</a >

        <h1>数据分析技术（10个实操练习）</h1>

        <div class="exercise">
            <h3>练习1：创建基础数据表</h3>
            <textarea id="code1">import pandas as pd
data = {"科目":["语文","数学","英语"],"分数":[85,92,78]}
df = pd.DataFrame(data)
print(df)</textarea>
            <button onclick="runCode('code1','out1')">运行</button>
            <div id="out1"></div>
        </div>

        <div class="exercise">
            <h3>练习2：查看数据基本信息</h3>
            <textarea id="code2">import pandas as pd
df = pd.DataFrame({"A":[1,2,3,4],"B":[5,6,7,8]})
print("前2行数据：")
print(df.head(2))
print("数据形状：",df.shape)</textarea>
            <button onclick="runCode('code2','out2')">运行</button>
            <div id="out2"></div>
        </div>

        <div class="exercise">
            <h3>练习3：描述性统计</h3>
            <textarea id="code3">import pandas as pd
df = pd.DataFrame({"成绩":[88,76,90,82,79]})
print(df.describe())</textarea>
            <button onclick="runCode('code3','out3')">运行</button>
            <div id="out3"></div>
        </div>

        <div class="exercise">
            <h3>练习4：计算均值、最值</h3>
            <textarea id="code4">import pandas as pd
df = pd.DataFrame({"数值":[12,45,23,67,34]})
print("平均值：",df["数值"].mean())
print("最大值：",df["数值"].max())
print("最小值：",df["数值"].min())</textarea>
            <button onclick="runCode('code4','out4')">运行</button>
            <div id="out4"></div>
        </div>

        <div class="exercise">
            <h3>练习5：数据排序</h3>
            <textarea id="code5">import pandas as pd
df = pd.DataFrame({"姓名":["甲","乙","丙"],"分数":[72,95,81]})
df_sort = df.sort_values("分数",ascending=False)
print(df_sort)</textarea>
            <button onclick="runCode('code5','out5')">运行</button>
            <div id="out5"></div>
        </div>

        <div class="exercise">
            <h3>练习6：条件筛选数据</h3>
            <textarea id="code6">import pandas as pd
df = pd.DataFrame({"分数":[55,66,77,88,99]})
res = df[df["分数"] >= 70]
print("70分及以上数据：")
print(res)</textarea>
            <button onclick="runCode('code6','out6')">运行</button>
            <div id="out6"></div>
        </div>

        <div class="exercise">
            <h3>练习7：新增计算列</h3>
            <textarea id="code7">import pandas as pd
df = pd.DataFrame({"科目1":[80,85],"科目2":[90,76]})
df["总分"] = df["科目1"] + df["科目2"]
print(df)</textarea>
            <button onclick="runCode('code7','out7')">运行</button>
            <div id="out7"></div>
        </div>

        <div class="exercise">
            <h3>练习8：分组统计</h3>
            <textarea id="code8">import pandas as pd
df = pd.DataFrame({"类别":["A","A","B","B"],"数值":[10,20,30,40]})
print(df.groupby("类别")["数值"].sum())</textarea>
            <button onclick="runCode('code8','out8')">运行</button>
            <div id="out8"></div>
        </div>

        <div class="exercise">
            <h3>练习9：numpy数组运算</h3>
            <textarea id="code9">import numpy as np
arr1 = np.array([1,2,3])
arr2 = np.array([4,5,6])
print(arr1 + arr2)
print(arr1 * arr2)</textarea>
            <button onclick="runCode('code9','out9')">运行</button>
            <div id="out9"></div>
        </div>

        <div class="exercise">
            <h3>练习10：综合数据分析案例</h3>
            <textarea id="code10">import pandas as pd
data = {"班级":["1班","1班","2班","2班"],"成绩":[82,91,78,88]}
df = pd.DataFrame(data)
print("各班平均分：")
print(df.groupby("班级")["成绩"].mean())
</textarea>
            <button onclick="runCode('code10','out10')">运行</button>
            <div id="out10"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="../js/code-runner.js"></script>
</body>
</html>
