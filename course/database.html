<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据库原理与应用 | 课程学习</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .back-btn {
            display: inline-block;
            margin: 20px 0;
            padding: 10px 20px;
            background: #2980b9;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
        }
        .exercise {
            background: #fff;
            padding: 20px;
            margin: 15px 0;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        textarea {
            width: 100%;
            height: 180px;
            margin: 10px 0;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: monospace;
        }
        button {
            padding: 10px 20px;
            background: #27ae60;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #output {
            background: #222;
            color: #0f0;
            padding: 15px;
            border-radius: 8px;
            min-height: 120px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href=" " class="back-btn">← 返回首页</a >

        <h1>数据库原理与应用（10个实操练习）</h1>

        <div class="exercise">
            <h3>练习1：模拟用户表</h3>
            <textarea id="code1">import pandas as pd
user = pd.DataFrame({
    "id":[1,2,3],
    "name":["张三","李四","王五"],
    "age":[20,21,19]
})
print("用户表：")
print(user)</textarea>
            <button onclick="runCode('code1','out1')">运行</button>
            <div id="out1"></div>
        </div>

        <div class="exercise">
            <h3>练习2：单条件查询</h3>
            <textarea id="code2">import pandas as pd
df = pd.DataFrame({"name":["a","b","c"],"age":[18,22,25]})
res = df[df["age"] > 20]
print("年龄大于20的数据：")
print(res)</textarea>
            <button onclick="runCode('code2','out2')">运行</button>
            <div id="out2"></div>
        </div>

        <div class="exercise">
            <h3>练习3：多条件查询</h3>
            <textarea id="code3">import pandas as pd
df = pd.DataFrame({"姓名":["甲","乙"],"性别":["男","女"],"分数":[70,85]})
res = df[(df["分数"]>80) & (df["性别"]=="女")]
print(res)</textarea>
            <button onclick="runCode('code3','out3')">运行</button>
            <div id="out3"></div>
        </div>

        <div class="exercise">
            <h3>练习4：选取指定字段</h3>
            <textarea id="code4">import pandas as pd
df = pd.DataFrame({"id":[1,2],"name":["A","B"],"tel":["111","222"]})
print(df[["name","tel"]])</textarea>
            <button onclick="runCode('code4','out4')">运行</button>
            <div id="out4"></div>
        </div>

        <div class="exercise">
            <h3>练习5：数据排序（模拟ORDER BY）</h3>
            <textarea id="code5">import pandas as pd
df = pd.DataFrame({"name":["x","y"],"score":[66,99]})
print(df.sort_values("score",ascending=False))</textarea>
            <button onclick="runCode('code5','out5')">运行</button>
            <div id="out5"></div>
        </div>

        <div class="exercise">
            <h3>练习6：分组聚合</h3>
            <textarea id="code6">import pandas as pd
df = pd.DataFrame({"部门":["部1","部1","部2"],"薪资":[4000,5000,4500]})
print(df.groupby("部门")["薪资"].mean())</textarea>
            <button onclick="runCode('code6','out6')">运行</button>
            <div id="out6"></div>
        </div>

        <div class="exercise">
            <h3>练习7：两表关联（JOIN）</h3>
            <textarea id="code7">import pandas as pd
t1 = pd.DataFrame({"id":[1,2],"name":["A","B"]})
t2 = pd.DataFrame({"id":[1,2],"score":[88,92]})
join_df = pd.merge(t1,t2,on="id")
print(join_df)</textarea>
            <button onclick="runCode('code7','out7')">运行</button>
            <div id="out7"></div>
        </div>

        <div class="exercise">
            <h3>练习8：去重（DISTINCT）</h3>
            <textarea id="code8">import pandas as pd
df = pd.DataFrame({"类别":["a","a","b"]})
print(df["类别"].drop_duplicates())</textarea>
            <button onclick="runCode('code8','out8')">运行</button>
            <div id="out8"></div>
        </div>

        <div class="exercise">
            <h3>练习9：统计行数</h3>
            <textarea id="code9">import pandas as pd
df = pd.DataFrame({"数据":[1,2,3,4]})
print("数据总行数：",len(df))</textarea>
            <button onclick="runCode('code9','out9')">运行</button>
            <div id="out9"></div>
        </div>

        <div class="exercise">
            <h3>练习10：数据库综合查询</h3>
            <textarea id="code10">import pandas as pd
user = pd.DataFrame({"uid":[1,2],"uname":["小明","小红"]})
info = pd.DataFrame({"uid":[1,2],"age":[20,21]})
res = pd.merge(user,info,on="uid")
print("联表查询结果：")
print(res)
</textarea>
            <button onclick="runCode('code10','out10')">运行</button>
            <div id="out10"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>
    <script src="../js/code-runner.js"></script>
</body>
</html>
